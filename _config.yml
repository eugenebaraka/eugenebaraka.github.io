site: Eugene Baraka
email: eugenebaraka@gmail.com
description: >- # this means to ignore newlines until "baseurl:"

baseurl: "" # the subpath of your site, e.g. /blog
url: eugenebaraka.github.io #hostname for your site

twitter_username:
github_username:  eugenebaraka

google_analytics: G-DS0XBYFETS
linkedin_username: 
author:             Eugene Baraka

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /blog/:slug
  projects:
    output: true
    permalink: /project/:slug
  readings:
    output: true
    permalink: /readings/:slug

defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

    scope:
      path: ""
      type: "readings"
    values:
      layout: "reading"

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  
theme: minima
  
sass:
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

paginate: 6
paginate_path: "/blog/page:num/"
  
